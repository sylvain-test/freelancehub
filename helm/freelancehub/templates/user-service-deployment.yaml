apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.userService.name }}
  labels:
    app: {{ .Values.userService.name }}
spec:
  replicas: {{ .Values.userService.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.userService.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.userService.name }}
    spec:
      containers:
        - name: {{ .Values.userService.name }}
          image: "{{ .Values.userService.image }}:{{ .Values.global.imageTag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.userService.port }}
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "{{ .Values.global.springProfile }}"
          resources:
            requests:
              memory: {{ .Values.userService.resources.requests.memory }}
              cpu: {{ .Values.userService.resources.requests.cpu }}
            limits:
              memory: {{ .Values.userService.resources.limits.memory }}
              cpu: {{ .Values.userService.resources.limits.cpu }}
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: {{ .Values.userService.port }}
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: {{ .Values.userService.port }}
            initialDelaySeconds: 30
            periodSeconds: 5
