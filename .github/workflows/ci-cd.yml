name: FreelanceHub CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Build et Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build user-service
        run: cd user-service && mvn clean package -DskipTests

      - name: Build mission-service
        run: cd mission-service && mvn clean package -DskipTests

      - name: Build notification-service
        run: cd notification-service && mvn clean package -DskipTests

  build-docker:
    name: Build Images Docker
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build des jars
        run: |
          cd user-service && mvn clean package -DskipTests && cd ..
          cd mission-service && mvn clean package -DskipTests && cd ..
          cd notification-service && mvn clean package -DskipTests && cd ..

      - name: Build image user-service
        run: docker build -t user-service:${{ github.sha }} ./user-service

      - name: Build image mission-service
        run: docker build -t mission-service:${{ github.sha }} ./mission-service

      - name: Build image notification-service
        run: docker build -t notification-service:${{ github.sha }} ./notification-service

  deploy:
    name: Déploiement Kubernetes
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation Helm
        uses: azure/setup-helm@v4

      - name: Déploiement avec Helm
        run: |
          helm upgrade --install freelancehub ./helm/freelancehub \
            --set global.imageTag=${{ github.sha }} \
            --wait
