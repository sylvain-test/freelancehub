apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.notificationService.name }}
  labels:
    app: {{ .Values.notificationService.name }}
spec:
  selector:
    app: {{ .Values.notificationService.name }}
  ports:
    - protocol: TCP
      port: {{ .Values.notificationService.port }}
      targetPort: {{ .Values.notificationService.port }}
  type: ClusterIP
